<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuitWise Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div id="loginPage">

<div class="left-section">

<h1>QuitWise</h1>

<p>Smoking & Alcohol Health Tracker</p>

</div>

<div class="right-section">

<div class="login-card">

<h2>Welcome Back</h2>

<p class="sub">
Login to continue
</p>

<form action="/login"
method="POST">

<div class="input-box">

<input type="email"
name="email"
placeholder="Enter Email"
required>

</div>

<div class="input-box">

<input type="password"
name="password"
placeholder="Enter Password"
required>

</div>

<button type="submit">

Login

</button>

</form>

<p style="margin-top:20px;">

Don't have account?

<a href="/signup"
style="color:#22C55E;">

Create Account

</a>

</p>

</div>

</div>

</div>

</body>

</html>
